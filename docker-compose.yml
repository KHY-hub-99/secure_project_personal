# [R7] Docker Compose — 개발 환경
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentshield
      POSTGRES_USER: agentshield
      POSTGRES_PASSWORD: agentshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentshield -d agentshield"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  chromadb:
    image: chromadb/chroma:latest
    container_name: agentshield-chroma
    ports:
      - "8003:8000" # 호스트의 8003번 포트로 연결 (포트 충돌 방지)
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE

  chroma-ui:
    image: fengzhichao/chromadb-admin:latest
    container_name: agentshield-chroma-ui
    ports:
      - "8004:3001" # 이 이미지는 내부적으로 3001 포트를 사용합니다.
    depends_on:
      - chromadb

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentshield:agentshield@db:5432/agentshield
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./adapters:/app/adapters
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  defense-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    command: uvicorn defense_proxy.proxy_server:app --host 0.0.0.0 --port 8001 --reload

  monitoring-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    command: uvicorn monitoring_proxy.monitor_server:app --host 0.0.0.0 --port 8002 --reload

volumes:
  pgdata:
  chromadata:
